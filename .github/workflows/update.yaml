name: Update package version

on:
    schedule:
        - cron: "0 6 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Check for new release
              id: check
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  latest=$(gh release view --repo liujed/dns01proxy --json tagName -q '.tagName' | sed 's/^v//')
                  current=$(grep 'version:' melange.yaml | head -1 | sed 's/.*version: "\(.*\)"/\1/')
                  echo "latest=${latest}" >> "$GITHUB_OUTPUT"
                  echo "current=${current}" >> "$GITHUB_OUTPUT"
                  if [ "${latest}" != "${current}" ]; then
                    echo "update=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Get commit SHA for new tag
              if: steps.check.outputs.update == 'true'
              id: commit
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  sha=$(gh api "repos/liujed/dns01proxy/commits/v${{ steps.check.outputs.latest }}" -q '.sha')
                  echo "sha=${sha}" >> "$GITHUB_OUTPUT"

            - name: Update melange.yaml
              if: steps.check.outputs.update == 'true'
              env:
                  NEW_VERSION: ${{ steps.check.outputs.latest }}
                  NEW_SHA: ${{ steps.commit.outputs.sha }}
              run: |
                  sed -i "s/version: \"[0-9.]*\"/version: \"${NEW_VERSION}\"/" melange.yaml
                  sed -i "s/expected-commit: [a-f0-9]*/expected-commit: ${NEW_SHA}/" melange.yaml

            - name: Create pull request
              if: steps.check.outputs.update == 'true'
              uses: peter-evans/create-pull-request@v7
              with:
                  title: "Update dns01proxy to v${{ steps.check.outputs.latest }}"
                  branch: update/dns01proxy-${{ steps.check.outputs.latest }}
                  commit-message: "melange: update dns01proxy to v${{ steps.check.outputs.latest }}"
                  body: |
                      Automated version bump of dns01proxy from v${{ steps.check.outputs.current }} to v${{ steps.check.outputs.latest }}.
