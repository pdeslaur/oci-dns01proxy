name: Build and publish

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    id-token: write # for signing
    packages: write # for publishing to GHCR

jobs:
    build:
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                arch: [x86_64, aarch64]
                include:
                    - arch: aarch64
                      runner: ubuntu-24.04-arm
                    - arch: x86_64
                      runner: ubuntu-24.04
        steps:
            - uses: actions/checkout@v4

            - name: Restore cached packages
              id: cache
              uses: actions/cache@v4
              with:
                  path: ./packages
                  key: melange-${{ matrix.arch }}-${{ hashFiles('melange.yaml') }}

            - name: Build package
              if: steps.cache.outputs.cache-hit != 'true'
              uses: chainguard-dev/actions/melange-build@main
              with:
                  config: melange.yaml
                  sign-with-temporary-key: true
                  archs: ${{ matrix.arch }}

            - name: Upload packages
              uses: actions/upload-artifact@v4
              with:
                  name: packages-${{ matrix.arch }}
                  path: ./packages
                  retention-days: 1
                  if-no-files-found: error

    publish:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4

            - uses: chainguard-dev/actions/setup-melange@main

            - name: Download x86_64 packages
              uses: actions/download-artifact@v4
              with:
                  name: packages-x86_64
                  path: ./packages

            - name: Download aarch64 packages
              uses: actions/download-artifact@v4
              with:
                  name: packages-aarch64
                  path: ./packages

            - name: Re-index packages under a single key
              run: |
                  melange keygen melange.rsa
                  for arch in x86_64 aarch64; do
                    melange sign -k melange.rsa packages/$arch/*.apk
                    melange index -o packages/$arch/APKINDEX.tar.gz packages/$arch/*.apk
                    melange sign-index --signing-key melange.rsa packages/$arch/APKINDEX.tar.gz
                  done

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and publish image
              uses: chainguard-images/actions/apko-publish@main
              with:
                  config: apko.yaml
                  tag: ghcr.io/${{ github.repository }}:latest
                  keyring-append: ./melange.rsa.pub
                  repository-append: ./packages
